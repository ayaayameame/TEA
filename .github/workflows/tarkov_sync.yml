name: Tarkov Market Dual-Mode Sync

on:
  schedule:
    # Trigger every 10 minutes
    - cron: '*/10 * * * *'
  
  # Allow manual execution from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    
    # Set a strict timeout to prevent accidental credit consumption
    timeout-minutes: 5 

    steps:
      # 1. Access the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup uv with persistent caching
      # This caches your dependencies (supabase, dotenv) in GitHub's internal network
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Note: If you have a pyproject.toml or uv.lock, 
          # uv will use them to speed up resolution significantly.

      # 3. Use the pre-installed Python version
      # ubuntu-latest usually comes with Python 3.12 pre-loaded.
      # By pinning instead of installing, we save ~10 seconds.
      - name: Pin Python Version
        run: uv python pin 3.12

      # 4. Execute the Sync Engine
      # '--no-dev' ensures we don't waste time installing test/dev libraries.
      - name: Execute Cloud Sync Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run --no-dev src/cloud_sync.py