name: Tarkov Market Dual-Mode Sync

on:
  schedule:
    # Trigger every 5 minutes
    - cron: '*/5 * * * *'
  
  # Allow manual execution from the Actions tab
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    
    # Safety timeout to prevent infinite loops on alpha software
    timeout-minutes: 5 

    steps:
      # 1. Pull the latest code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup uv with caching enabled for faster subsequent runs
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Explicitly install Python 3.14
      # Since it's not pre-installed, uv will download the binary here.
      # This resolves the "incompatible with >=3.14" error.
      - name: Install Python 3.14
        run: uv python install 3.14

      # 4. Execute the Sync Engine
      # uv run will now automatically detect and use the 3.14 version we just installed.
      - name: Execute Cloud Sync Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run --no-dev src/cloud_sync.py
