name: Tarkov Market Dual-Mode Sync

on:
  # ----------------------------------------------------------------------------
  # EXTERNAL TRIGGER (WEBHOOK)
  # This listens for a POST request from services like Cron-job.org.
  # The payload must contain {"event_type": "cron_trigger"}
  # ----------------------------------------------------------------------------
  repository_dispatch:
    types: [cron_trigger]
  
  # ----------------------------------------------------------------------------
  # MANUAL TRIGGER
  # Allows you to manually click "Run workflow" from the GitHub Actions tab.
  # ----------------------------------------------------------------------------
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    
    # ----------------------------------------------------------------------------
    # ENVIRONMENT VARIABLES
    # Force actions to use Node.js 24 to suppress the Node 20 deprecation warning.
    # ----------------------------------------------------------------------------
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # Safety timeout to prevent runaway processes and save runner minutes
    timeout-minutes: 5 

    steps:
      # 1. Pull the latest code from the main branch
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup the 'uv' package manager with dependency caching enabled
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Explicitly install Python 3.14
      # This downloads the specific binary required by the pyproject.toml constraint.
      - name: Install Python 3.14
        run: uv python install 3.14

      # 4. Execute the Python sync script
      # Runs the logic to fetch Tarkov data and push/settle it in Supabase.
      - name: Execute Cloud Sync Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run --no-dev src/cloud_sync.py
